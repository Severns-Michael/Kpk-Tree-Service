<svg width="100%" viewBox="0 0 580 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Emblem: Tree stump cross-section with crosshairs -->
  <g transform="translate(70, 100)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="62" fill="none" stroke="#4a9e4a" stroke-width="2.5"/>
    <!-- Inner dashed ring -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#4a9e4a" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
    <!-- Tree rings -->
    <circle cx="0" cy="0" r="38" fill="none" stroke="#333" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="#333" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#333" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="4" fill="#4a9e4a" opacity="0.6"/>
    <!-- Crosshair lines -->
    <line x1="0" y1="-48" x2="0" y2="-28" stroke="#555" stroke-width="0.8"/>
    <line x1="0" y1="28" x2="0" y2="48" stroke="#555" stroke-width="0.8"/>
    <line x1="-48" y1="0" x2="-28" y2="0" stroke="#555" stroke-width="0.8"/>
    <line x1="28" y1="0" x2="48" y2="0" stroke="#555" stroke-width="0.8"/>
    <!-- Diagonal ticks -->
    <line x1="-34" y1="-34" x2="-20" y2="-20" stroke="#555" stroke-width="0.8"/>
    <line x1="20" y1="-20" x2="34" y2="-34" stroke="#555" stroke-width="0.8"/>
    <line x1="-34" y1="34" x2="-20" y2="20" stroke="#555" stroke-width="0.8"/>
    <line x1="20" y1="20" x2="34" y2="34" stroke="#555" stroke-width="0.8"/>
    <!-- KPK badge in center -->
    <rect x="-42" y="-15" width="84" height="30" rx="4" fill="#0d0d0d" stroke="#4a9e4a" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="900" fill="white" letter-spacing="3">KPK</text>
    <!-- Top arc -->
    <path d="M -35 -48 Q 0 -60 35 -48" fill="none" stroke="#4a9e4a" stroke-width="2" stroke-linecap="round"/>
    <!-- Bottom arc -->
    <path d="M -35 48 Q 0 60 35 48" fill="none" stroke="#4a9e4a" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Vertical divider -->
  <line x1="155" y1="25" x2="155" y2="175" stroke="#4a9e4a" stroke-width="1.5" opacity="0.4"/>

  <!-- Text block -->
  <g transform="translate(180, 0)">
    <!-- Company name -->
    <text x="0" y="60" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="54" font-weight="900" fill="white" letter-spacing="-1">KPK</text>

    <!-- Green rule -->
    <line x1="0" y1="72" x2="340" y2="72" stroke="#4a9e4a" stroke-width="1.5"/>

    <!-- Tagline -->
    <text x="0" y="95" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="13" font-weight="600" fill="#cccccc" letter-spacing="1.5">TREE SERVICE  &amp;  PROPERTY MAINTENANCE</text>

    <!-- Green rule -->
    <line x1="0" y1="106" x2="340" y2="106" stroke="#4a9e4a" stroke-width="1.5"/>

    <!-- Location -->
    <text x="0" y="130" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="11" font-weight="600" fill="#888888" letter-spacing="3">MANSFIELD, OHIO</text>

    <!-- Badges -->
    <g transform="translate(0, 150)">
      <!-- Free Estimates badge (filled) -->
      <rect x="0" y="0" width="110" height="26" rx="4" fill="#4a9e4a"/>
      <text x="55" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="white" letter-spacing="1.5">FREE ESTIMATES</text>
      <!-- Fully Insured badge (outlined) -->
      <rect x="120" y="0" width="110" height="26" rx="4" fill="none" stroke="#4a9e4a" stroke-width="1.5"/>
      <text x="175" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#4a9e4a" letter-spacing="1.5">FULLY INSURED</text>
    </g>
  </g>
</svg>
